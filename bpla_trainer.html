<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер-симулятор: Атака БПЛА</title>
    <style>
        :root {
            --bg-page: #eef4fb;
            --panel-bg: #ffffff;
            --panel-soft: #f8fbff;
            --panel-warm: #fff7ed;
            --ink: #111827;
            --text-main: #111827;
            --text-muted: #374151;
            --border-color: #94a3b8;
            --accent-red: #d71920;
            --accent-red-deep: #9f1218;
            --accent-blue: #0b4ea2;
            --accent-blue-deep: #082f6f;
            --accent-green: #067a46;
            --accent-yellow: #f59e0b;
            --shadow-hard: 0 30px 80px rgba(15, 23, 42, 0.30);
            --button-bg: #0b1f46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background:
                radial-gradient(circle at 18% 12%, rgba(215, 25, 32, 0.12) 0, transparent 30%),
                radial-gradient(circle at 86% 18%, rgba(11, 78, 162, 0.14) 0, transparent 34%),
                linear-gradient(135deg, #f8fbff 0%, #eef4fb 45%, #e1ebf7 100%);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #trainer-container {
            width: 100%;
            max-width: 1024px;
            height: 100%;
            max-height: 700px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 52%, #edf5ff 100%);
            border: 3px solid var(--border-color);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-hard);
            isolation: isolate;
        }

        #trainer-container::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(215, 25, 32, 0.18), transparent 16%, transparent 84%, rgba(215, 25, 32, 0.18)),
                radial-gradient(circle at 50% 30%, transparent 0%, transparent 58%, rgba(15, 23, 42, 0.20) 100%);
            opacity: 0;
        }

        #trainer-container::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 7;
            opacity: 0.18;
            background-image:
                repeating-linear-gradient(0deg, rgba(15, 23, 42, 0.07) 0px, rgba(15, 23, 42, 0.07) 1px, transparent 1px, transparent 7px),
                repeating-linear-gradient(90deg, transparent 0px, transparent 42px, rgba(215, 25, 32, 0.08) 43px, transparent 44px);
            mix-blend-mode: multiply;
        }

        .siren-active {
            animation: alarm-border 1.05s infinite;
        }

        .siren-active::before {
            animation: alarm-flash-screen 1.05s infinite;
        }

        @keyframes alarm-border {
            0%, 100% { border-color: var(--border-color); box-shadow: var(--shadow-hard), inset 0 0 0 rgba(215, 25, 32, 0); }
            45% { border-color: var(--accent-red); box-shadow: 0 30px 90px rgba(215, 25, 32, 0.32), inset 0 0 55px rgba(215, 25, 32, 0.24); }
            55% { border-color: var(--accent-red-deep); box-shadow: 0 30px 90px rgba(215, 25, 32, 0.38), inset 0 0 75px rgba(215, 25, 32, 0.32); }
        }

        @keyframes alarm-flash-screen {
            0%, 100% { opacity: 0.02; }
            42% { opacity: 0.42; }
            50% { opacity: 0.18; }
            58% { opacity: 0.48; }
        }

        .shake {
            animation: screen-shake 0.45s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes screen-shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
            40%, 60% { transform: translate3d(7px, 0, 0); }
        }

        .smoke-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 22% 68%, rgba(71,85,105,0.22) 0%, transparent 36%),
                radial-gradient(circle at 75% 20%, rgba(148,163,184,0.28) 0%, transparent 42%),
                linear-gradient(120deg, transparent 0%, rgba(51,65,85,0.12) 48%, transparent 100%);
            pointer-events: none;
            z-index: 5;
            mix-blend-mode: multiply;
            animation: smoke-move 5s ease-in-out infinite alternate;
            opacity: 0;
            transition: opacity 1s ease;
            filter: blur(1px);
        }

        @keyframes smoke-move {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.08) translate(18px, -16px); }
        }

        .header-panel {
            height: 64px;
            background: linear-gradient(90deg, #ffffff 0%, #f8fafc 54%, #fff1f2 100%);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 10;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .header-title {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
        }

        .btn-utility {
            background: var(--button-bg);
            border: 2px solid #020617;
            color: #ffffff;
            padding: 9px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: transform 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s;
            box-shadow: 0 8px 18px rgba(11, 31, 70, 0.22);
        }

        .btn-utility:hover {
            background: var(--accent-red);
            border-color: var(--accent-red-deep);
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(215, 25, 32, 0.28);
        }

        .metrics-bar {
            display: flex;
            background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
            padding: 16px 24px;
            border-bottom: 2px solid var(--border-color);
            gap: 40px;
            z-index: 10;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            gap: 7px;
            flex: 1;
        }

        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #0f172a;
            font-weight: bold;
            letter-spacing: 0.7px;
        }

        .metric-value-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .metric-progress {
            height: 12px;
            background-color: #ffffff;
            border-radius: 999px;
            flex: 1;
            overflow: hidden;
            border: 1px solid #64748b;
            box-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.14);
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #16a34a, var(--accent-green));
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        .metric-digit {
            font-size: 17px;
            font-weight: bold;
            min-width: 45px;
            text-align: right;
            color: #0f172a;
        }

        .main-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 8;
        }

        .scenario-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-color);
            background: #ffffff;
            overflow: hidden;
        }

        .visual-viewport {
            height: 270px;
            background:
                linear-gradient(135deg, #e2e8f0 0%, #ffffff 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            overflow: hidden;
        }

        .visual-viewport::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(215, 25, 32, 0.26), transparent 14%, transparent 86%, rgba(215, 25, 32, 0.26)),
                radial-gradient(circle at 50% 55%, transparent 0%, transparent 50%, rgba(15, 23, 42, 0.36) 100%);
            animation: viewport-pulse 1.2s infinite;
        }

        .visual-viewport::after {
            content: "";
            position: absolute;
            inset: 14px;
            z-index: 3;
            pointer-events: none;
            border: 2px solid rgba(255, 255, 255, 0.72);
            box-shadow: inset 0 0 0 1px rgba(215, 25, 32, 0.34), 0 0 0 999px rgba(255,255,255,0.02);
        }

        @keyframes viewport-pulse {
            0%, 100% { opacity: 0.28; }
            48% { opacity: 0.58; }
        }

        .scene-visual {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .scene-visual img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            filter: contrast(1.04) saturate(0.98) brightness(1.04);
        }

        .scene-visual .visual-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #dbeafe, #fff7ed);
        }

        .description-block {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow: hidden;
            background:
                linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }

        .step-indicator {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-red);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .situation-title {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.3;
            color: #0f172a;
        }

        .situation-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .interactive-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(circle at 100% 0%, rgba(215, 25, 32, 0.13) 0, transparent 34%),
                linear-gradient(180deg, #f8fafc 0%, #eaf2fb 100%);
            padding: 24px;
            justify-content: center;
            overflow: hidden;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .option-card {
            background: linear-gradient(135deg, #0f172a 0%, #0b1f46 55%, #082f6f 100%);
            border: 2px solid #2563eb;
            border-left: 8px solid var(--accent-yellow);
            border-radius: 12px;
            padding: 18px;
            cursor: pointer;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            text-align: left;
            color: #ffffff;
            box-shadow: 0 13px 24px rgba(15, 23, 42, 0.20);
        }

        .option-card:hover {
            border-color: var(--accent-red);
            border-left-color: var(--accent-red);
            background: linear-gradient(135deg, #111827 0%, #172554 50%, #9f1218 130%);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 18px 30px rgba(215, 25, 32, 0.25);
        }

        .option-card:active {
            transform: translateY(0) scale(0.995);
        }

        .option-letter {
            background: #fbbf24;
            border: 2px solid #ffffff;
            color: #111827;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.20);
        }

        .option-text {
            font-size: 14px;
            line-height: 1.5;
            font-weight: bold;
            color: #ffffff;
        }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 50% 35%, rgba(255,255,255,0.24) 0, transparent 34%),
                rgba(15, 23, 42, 0.78);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow: hidden;
        }

        .feedback-card {
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border: 3px solid var(--border-color);
            border-top: 8px solid var(--accent-red);
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 30px 65px rgba(0,0,0,0.34);
            overflow: hidden;
            color: #0f172a;
        }

        .feedback-status {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .status-success { color: var(--accent-green); }
        .status-danger { color: var(--accent-red); }

        .feedback-title {
            font-size: 24px;
            font-weight: bold;
            color: #0f172a;
        }

        .feedback-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .feedback-consequence {
            background: #fff7ed;
            border-left: 6px solid var(--accent-red);
            padding: 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 0 8px 8px 0;
            border-top: 1px solid #fed7aa;
            border-right: 1px solid #fed7aa;
            border-bottom: 1px solid #fed7aa;
            color: #111827;
        }

        .feedback-consequence.consequence-good {
            background: #ecfdf5;
            border-left-color: var(--accent-green);
            border-top-color: #bbf7d0;
            border-right-color: #bbf7d0;
            border-bottom-color: #bbf7d0;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-red-deep) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.18s, box-shadow 0.18s;
            margin-top: 10px;
            align-self: flex-start;
            border: 1px solid #ffffff;
            box-shadow: 0 12px 24px rgba(215, 25, 32, 0.28);
        }

        .btn-action:hover {
            opacity: 0.94;
            transform: translateY(-1px);
            box-shadow: 0 15px 28px rgba(215, 25, 32, 0.34);
        }

        .timer-alert {
            animation: timer-burn 0.42s infinite alternate;
        }
        @keyframes timer-burn {
            0% { color: #0f172a; transform: scale(1); }
            100% { color: var(--accent-red); transform: scale(1.13); text-shadow: 0 0 12px rgba(215,25,32,0.45); }
        }

        @media (max-width: 900px) {
            .header-panel { padding: 0 14px; }
            .header-title { font-size: 13px; }
            .metrics-bar { gap: 18px; padding: 12px 14px; }
            .main-workspace { flex-direction: column; }
            .scenario-side { border-right: none; border-bottom: 2px solid var(--border-color); }
            .visual-viewport { height: 210px; }
            .interactive-side { padding: 16px; }
            .description-block { padding: 16px; }
        }
    </style>
</head>
<body>

    <div id="trainer-container" class="siren-active">
        <div class="smoke-overlay" id="smoke"></div>

        <div class="header-panel">
            <div class="header-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--accent-red)">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Эвакуация при атаке БПЛА
            </div>
            <div class="header-controls">
                <button class="btn-utility" id="btn-sound" onclick="toggleSound()">Звук: Выкл</button>
                <button class="btn-utility" id="btn-fullscreen" onclick="toggleFullscreen()">На весь экран</button>
            </div>
        </div>

        <div class="metrics-bar">
            <div class="metric-item">
                <div class="metric-label">Баллы АТЗ</div>
                <div class="metric-value-container">
                    <div class="metric-progress">
                        <div class="progress-fill" id="score-bar" style="width: 100%;"></div>
                    </div>
                    <div class="metric-digit" id="score-text">100</div>
                </div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Целостность группы</div>
                <div class="metric-value-container">
                    <div class="metric-progress">
                        <div class="progress-fill" id="health-bar" style="width: 100%;"></div>
                    </div>
                    <div class="metric-digit" id="health-text">100%</div>
                </div>
            </div>
            <div class="metric-item" style="flex: 0.4;">
                <div class="metric-label">Таймер</div>
                <div class="metric-value-container">
                    <div class="metric-digit" id="timer-text" style="text-align: left; width: 100%;">30с</div>
                </div>
            </div>
        </div>

        <div class="main-workspace">
            <div class="scenario-side">
                <div class="visual-viewport" id="viewport-svg"></div>
                <div class="description-block">
                    <div class="step-indicator" id="step-num">Ситуация 1</div>
                    <div class="situation-title" id="sit-title">Загрузка...</div>
                    <div class="situation-text" id="sit-text">Загрузка...</div>
                </div>
            </div>

            <div class="interactive-side">
                <div class="options-container" id="options-box"></div>
            </div>
        </div>

        <div class="feedback-overlay" id="feedback-modal">
            <div class="feedback-card">
                <div class="feedback-status status-danger" id="fb-status">Внимание</div>
                <div class="feedback-title" id="fb-title">Результат действия</div>
                <div class="feedback-consequence" id="fb-consequence">Контекст ошибки.</div>
                <div class="feedback-text" id="fb-text">Описание.</div>
                <button class="btn-action" id="fb-btn" onclick="closeFeedback()">Продолжить</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 0;
        let score = 100;
        let health = 100;
        let timerInterval = null;
        let timeLeft = 30;
        let audioCtx = null;
        let oscillator = null;
        let isSoundOn = false;
        let timerIntervalSound = null;

        const svgAssets = {
            step1: `<div class="scene-visual"><img src="bpla_assets/scene-1-facade.png" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;visual-fallback&quot;></div>'"></div>`,
            step2: `<div class="scene-visual"><img src="bpla_assets/scene-2-stairs.png" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;visual-fallback&quot;></div>'"></div>`,
            step3: `<div class="scene-visual"><img src="bpla_assets/scene-3-drone.png" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;visual-fallback&quot;></div>'"></div>`,
            step4: `<div class="scene-visual"><img src="bpla_assets/scene-4-shelter.png" alt="" onerror="this.parentElement.innerHTML='<div class=&quot;visual-fallback&quot;></div>'"></div>`
        };

        const scenario = [
            {
                title: "Удар в фасад здания. Выбор маршрута",
                text: "Произошел взрыв. Здание содрогнулось. Окна в офисе частично выбиты, осколки падают внутрь. В холле нарастает задымление. Включилась автоматическая сирена. Рядом находятся 4 сотрудника в состоянии шока. Каковы ваши действия?",
                svg: svgAssets.step1,
                time: 25,
                options: [
                    {
                        letter: "А",
                        text: "Вести группу к главной лестнице: это кратчайший и стандартный путь эвакуации.",
                        scoreChange: -30,
                        healthChange: -40,
                        isFatal: false,
                        title: "Критическая ошибка",
                        status: "danger",
                        consequence: "Главная лестница проходит вдоль застекленного холла. Повторные удары или обрушения конструкции приведут к поражению людей осколками.",
                        textFeedback: "Сотрудники получили порезы. Направление заблокировано обломками. Потеряно время на смену маршрута."
                    },
                    {
                        letter: "Б",
                        text: "Увести людей от окон в глухой коридор, проверить служебную лестницу, назначить замыкающего.",
                        scoreChange: 15,
                        healthChange: 0,
                        isFatal: false,
                        title: "Решение верное",
                        status: "success",
                        consequence: "Вы исключили риск поражения людей осколками стекол, упорядочили движение и обеспечили защиту от первичных поражающих факторов.",
                        textFeedback: "Группа оперативно переместилась в безопасную зону коридора. Замыкающий контролирует состав."
                    },
                    {
                        letter: "В",
                        text: "Оставаться в кабинете под защитой мебели до завершения работы сирены оповещения.",
                        scoreChange: -20,
                        healthChange: -25,
                        isFatal: false,
                        title: "Ошибка фиксации",
                        status: "danger",
                        consequence: "В холле увеличивается концентрация угарного газа. Пассивное ожидание в зоне разрушенного фасада ведет к отравлению продуктами горения.",
                        textFeedback: "Дым проник в кабинет. Приходится начинать эвакуацию в критических условиях задымления."
                    }
                ]
            },
            {
                title: "Управление поведением персонала",
                text: "Два сотрудника паникуют, отказываются спускаться по темной служебной лестнице и пытаются вернуться в кабинет за документами и вещами. Ваши действия?",
                svg: svgAssets.step2,
                time: 20,
                options: [
                    {

        function initTrainer() {
            currentStep = 0;
            score = 100;
            health = 100;
            document.getElementById('smoke').style.opacity = '0.4';
            updateMetrics();
            loadStep();
            startTimer();
        }

        function updateMetrics() {
            if(score < 0) score = 0;
            if(health < 0) health = 0;

            document.getElementById('score-text').innerText = score;
            document.getElementById('score-bar').style.width = score + '%';
            
            document.getElementById('health-text').innerText = health + '%';
            document.getElementById('health-bar').style.width = health + '%';

            document.getElementById('health-bar').style.backgroundColor = health < 40 ? 'var(--accent-red)' : 'var(--accent-green)';
            document.getElementById('score-bar').style.backgroundColor = score < 50 ? 'var(--accent-red)' : 'var(--accent-green)';
        }

        function loadStep() {
            if (currentStep >= scenario.length) {
                showFinalReport();
                return;
            }

            const stepData = scenario[currentStep];
            document.getElementById('step-num').innerText = `Ситуация ${currentStep + 1} из ${scenario.length}`;
            document.getElementById('sit-title').innerText = stepData.title;
            document.getElementById('sit-text').innerText = stepData.text;
            document.getElementById('viewport-svg').innerHTML = stepData.svg;

            const container = document.getElementById('trainer-container');
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 400);

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            
            const shuffledOptions = [...stepData.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const card = document.createElement('button');
                card.className = 'option-card';
                card.onclick = () => handleChoice(opt);
                card.innerHTML = `
                    <div class="option-letter">${opt.letter}</div>
                    <div class="option-text">${opt.text}</div>
                `;
                optionsBox.appendChild(card);
            });

            timeLeft = stepData.time;
            document.getElementById('timer-text').innerText = timeLeft + 'с';
            document.getElementById('timer-text').classList.remove('timer-alert');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft + 'с';
                
                if(timeLeft <= 5) {
                    document.getElementById('timer-text').classList.add('timer-alert');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function handleTimeout() {
            score -= 25;
            health -= 30;
            updateMetrics();
            
            const modal = document.getElementById('feedback-modal');
            document.getElementById('fb-status').className = "feedback-status status-danger";
            document.getElementById('fb-status').innerText = "Время истекло";
            document.getElementById('fb-title').innerText = "Потеря инициативы";
            document.getElementById('fb-consequence').innerText = "Промедление при эвакуации недопустимо. Задымление заблокировало пути отхода.";
            document.getElementById('fb-text').innerText = "Регламенты требуют незамедлительных действий. Персонал подвергся воздействию угарного газа.";
            
            if (health <= 0) {
                document.getElementById('fb-btn').innerText = "Начать заново";
                document.getElementById('fb-btn').onclick = () => { closeFeedback(); initTrainer(); };
            } else {
                document.getElementById('fb-btn').innerText = "Перейти дальше";
                document.getElementById('fb-btn').onclick = () => { closeFeedback(); nextStep(); };
            }
            
            modal.style.display = 'flex';
        }

        function handleChoice(option) {
            clearInterval(timerInterval);
            score += option.scoreChange;
            health += option.healthChange;
            updateMetrics();

            const modal = document.getElementById('feedback-modal');
            const statusEl = document.getElementById('fb-status');
            
            statusEl.innerText = option.status === "success" ? "Успешно" : "Ошибка";
            statusEl.className = `feedback-status status-${option.status}`;
            
            document.getElementById('fb-title').innerText = option.title;
            document.getElementById('fb-consequence').innerText = option.consequence;
            document.getElementById('fb-consequence').className = `feedback-consequence consequence-${option.status === 'success' ? 'good' : 'bad'}`;
            document.getElementById('fb-text').innerText = option.textFeedback;

            if (option.isFatal || health <= 0) {
                document.getElementById('fb-btn').innerText = "Начать сначала";
                document.getElementById('fb-btn').onclick = () => { closeFeedback(); initTrainer(); };
            } else {
                document.getElementById('fb-btn').innerText = "Продолжить";
                document.getElementById('fb-btn').onclick = () => { closeFeedback(); nextStep(); };
            }

            modal.style.display = 'flex';
        }

        function closeFeedback() {
            document.getElementById('feedback-modal').style.display = 'none';
        }

        function nextStep() {
            currentStep++;
            loadStep();
            if (currentStep < scenario.length) {
                startTimer();
            }
        }

        function showReportCard(finalTitle, finalStatus, textFeedback) {
            const modal = document.getElementById('feedback-modal');
            document.getElementById('fb-status').innerText = "Итог симуляции";
            document.getElementById('fb-status').className = `feedback-status status-${finalStatus}`;
            document.getElementById('fb-title').innerText = finalTitle;
            document.getElementById('fb-consequence').innerText = `Результат: ${score} баллов. Сохранение группы: ${health}%.`;
            document.getElementById('fb-consequence').className = `feedback-consequence consequence-${finalStatus === 'success' ? 'good' : 'bad'}`;
            document.getElementById('fb-text').innerText = textFeedback;
            document.getElementById('fb-btn').innerText = "Пройти повторно";
            document.getElementById('fb-btn').onclick = () => { closeFeedback(); initTrainer(); };
            modal.style.display = 'flex';
        }

        function showFinalReport() {
            clearInterval(timerInterval);
            document.getElementById('smoke').style.opacity = '0';
            
            if (score >= 80 && health > 70) {
                showReportCard(
                    "Оценка: Отлично. Алгоритмы выполнены.", 
                    "success", 
                    "Вы полностью реализовали требования нормативных документов МЧС. Персонал выведен без потерь, паника подавлена, контакт с опасным объектом исключен."
                );
            } else if (score >= 50 && health >= 40) {
                showReportCard(
                    "Оценка: Удовлетворительно. Допущены ошибки.", 
                    "success", 
                    "Цель достигнута, но люди подвергались риску поражения осколками из-за неоптимального выбора маршрута на начальном этапе эвакуации."
                );
            } else {
                showReportCard(
                    "Оценка: Неудовлетворительно. Группа пострадала.", 
                    "danger", 
                    "Действия привели к критическим последствиям. Нарушены прямые запреты инструкций по антитеррористической защищенности."
                );
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('trainer-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().then(() => {
                    document.getElementById('btn-fullscreen').innerText = "Обычный экран";
                }).catch(err => {
                    alert(`Ошибка Fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
                document.getElementById('btn-fullscreen').innerText = "На весь экран";
            }
        }

        function toggleSound() {
            if (!isSoundOn) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                
                timerIntervalSound = setInterval(() => {
                    if(oscillator) {
                        let curFreq = oscillator.frequency.value;
                        oscillator.frequency.setValueAtTime(curFreq === 500 ? 700 : 500, audioCtx.currentTime);
                    }
                }, 600);

                isSoundOn = true;
                document.getElementById('btn-sound').innerText = "Звук: Вкл";
                document.getElementById('btn-sound').style.background = "linear-gradient(135deg, var(--accent-red) 0%, var(--accent-red-deep) 100%)";
            } else {
                if(oscillator) {
                    oscillator.stop();
                    oscillator.disconnect();
                    oscillator = null;
                    clearInterval(timerIntervalSound);
                }
                isSoundOn = false;
                document.getElementById('btn-sound').innerText = "Звук: Выкл";
                document.getElementById('btn-sound').style.background = "var(--button-bg)";
            }
        }

        window.onload = () => {
            initTrainer();
            
            window.addEventListener('resize', () => {
                const container = document.getElementById('trainer-container');
                const winWidth = window.innerWidth;
                const winHeight = window.innerHeight;
                
                if(winWidth < 1024 || winHeight < 700) {
                    let scale = Math.min(winWidth / 1024, winHeight / 700);
                    if(scale < 0.6) scale = 0.6;
                    container.style.transform = `scale(${scale})`;
                } else {
                    container.style.transform = `scale(1)`;
                }
            });
        };
    </script>
