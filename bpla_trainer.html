<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер-симулятор: Атака БПЛА</title>
    <script type="module" src="./iframeResizer.contentWindow.js"></script>
    <style>
        :root {
            --bg-dark: #050507;
            --panel-bg: #121216;
            --accent-red: #ff3344;
            --accent-green: #00cc88;
            --text-main: #ffffff;
            --text-muted: #ced4da;
            --border-color: #4a4a5a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #trainer-container {
            width: 100%;
            max-width: 1024px;
            height: 100%;
            max-height: 700px;
            background-color: var(--panel-bg);
            border: 3px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .siren-active {
            animation: alarm-flash 1.5s infinite;
        }

        @keyframes alarm-flash {
            0% { box-shadow: inset 0 0 30px rgba(255, 51, 68, 0.3); }
            50% { box-shadow: inset 0 0 60px rgba(255, 51, 68, 0.7); border-color: var(--accent-red); }
            100% { box-shadow: inset 0 0 30px rgba(255, 51, 68, 0.3); }
        }

        .shake {
            animation: screen-shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes screen-shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
            40%, 60% { transform: translate3d(7px, 0, 0); }
        }

        .smoke-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(120,120,120,0.2) 0%, rgba(10,10,15,0.6) 80%);
            pointer-events: none;
            z-index: 5;
            mix-blend-mode: screen;
            animation: smoke-move 6s ease-in-out infinite alternate;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @keyframes smoke-move {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(15px, -15px); }
        }

        .header-panel {
            height: 60px;
            background-color: #000000;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 10;
        }

        .header-title {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
        }

        .btn-utility {
            background: #252530;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-utility:hover {
            background: #3e3e50;
            border-color: #ffffff;
        }

        .metrics-bar {
            display: flex;
            background-color: #0a0a0f;
            padding: 16px 24px;
            border-bottom: 2px solid var(--border-color);
            gap: 40px;
            z-index: 10;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .metric-value-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .metric-progress {
            height: 10px;
            background-color: #252530;
            border-radius: 5px;
            flex: 1;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            background-color: var(--accent-green);
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        .metric-digit {
            font-size: 16px;
            font-weight: bold;
            min-width: 45px;
            text-align: right;
        }

        .main-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .scenario-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-color);
            background-color: #09090d;
            overflow: hidden;
        }

        .visual-viewport {
            height: 250px;
            background-color: #000000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }

        .visual-viewport svg {
            width: 100%;
            height: 100%;
        }

        .description-block {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow: hidden;
        }

        .step-indicator {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-red);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .situation-title {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.3;
        }

        .situation-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .interactive-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #121216;
            padding: 24px;
            justify-content: center;
            overflow: hidden;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .option-card {
            background-color: #1a1a22;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 18px;
            cursor: pointer;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: all 0.2s ease;
            text-align: left;
            color: var(--text-main);
        }

        .option-card:hover {
            border-color: #ffffff;
            background-color: #252530;
            transform: translateY(-2px);
        }

        .option-letter {
            background-color: #000000;
            border: 2px solid var(--border-color);
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 14px;
            line-height: 1.5;
            font-weight: bold;
        }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow: hidden;
        }

        .feedback-card {
            background-color: #121216;
            border: 3px solid var(--border-color);
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,1);
            overflow: hidden;
        }

        .feedback-status {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .status-success { color: var(--accent-green); }
        .status-danger { color: var(--accent-red); }

        .feedback-title {
            font-size: 24px;
            font-weight: bold;
        }

        .feedback-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .feedback-consequence {
            background-color: #000000;
            border-left: 6px solid var(--accent-red);
            padding: 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 0 6px 6px 0;
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .feedback-consequence.consequence-good {
            border-left-color: var(--accent-green);
        }

        .btn-action {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
            align-self: flex-start;
            border: 1px solid #ffffff;
        }

        .btn-action:hover {
            opacity: 0.9;
        }

        .timer-alert {
            animation: timer-burn 0.5s infinite alternate;
        }
        @keyframes timer-burn {
            0% { color: var(--text-main); }
            100% { color: var(--accent-red); }
        }
    </style>
</head>
<body>

    <div id="trainer-container" class="siren-active">
        <div class="smoke-overlay" id="smoke"></div>

        <div class="header-panel">
            <div class="header-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--accent-red)">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                Эвакуация при атаке БПЛА
            </div>
            <div class="header-controls">
                <button class="btn-utility" id="btn-sound" onclick="toggleSound()">З
